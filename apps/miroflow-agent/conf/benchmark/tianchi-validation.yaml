# conf/benchmark/tianchi-validation.yaml
defaults:
  - default
  - _self_

name: "tianchi-validation"

data:
  data_dir: "../../data/tianchi"

execution:
  max_tasks: null  # null means no limit
  max_concurrent: 5
  pass_at_k: 1
  task_timeout_seconds: 600
  localization_gate_reserve_seconds: 30
  final_summary_reserve_seconds: 40
  localization_gate_full_min_remaining_seconds: 20
  localization_gate_degraded_min_remaining_seconds: 8
