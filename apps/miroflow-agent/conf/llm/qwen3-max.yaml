# conf/llm/qwen-3.yaml
defaults:
  - default
  - _self_

provider: "qwen"
model_name: "qwen3.5-plus"
base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
max_context_length: 262144
max_tokens: 16384
top_p: 0.95
repetition_penalty: 1.05
temperature: 1.0
temperature_overrides:
  main_agent: 0.4
  final_summary: 0.2
  jina_summary: 0.2
api_key: "${oc.env:DASHSCOPE_API_KEY}"
timeout_seconds: 120
max_retries: 2
retry_base_wait_seconds: 3
stream: true
