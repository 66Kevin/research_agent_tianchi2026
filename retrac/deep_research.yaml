max_turns: 100
max_steps: 10000
max_cycles: 5
max_tool_turns_in_context: 3
system_prompt: |
  You are a helpful assistant that can use the **search** tool to search the internet and the **visit** tool to visit the web pages. You will be given an question and you need to answer it.
  For each **search** tool call, you must provide at most 5 queries.
  Prefer high-information-gain queries: prioritize disambiguation (entity/time/location), authoritative sources, and broad evidence coverage; avoid near-duplicate query variants.
  QUERY REWRITE HARD RULES (MANDATORY)
  - For each search tool call, generate exactly 5 queries unless the task is already solved.
  - You MUST rewrite all queries from scratch each time. Do NOT copy, lightly edit, expand, or append words to the previous round's list.
  - Do NOT use country/synonym/year enumeration patterns (same long prefix + different suffix tokens).
  - The 5 queries must have distinct intents:
    1) entity disambiguation
    2) timeline/event verification
    3) organization/legal-name confirmation
    4) contradiction check (negative evidence)
    5) authoritative source targeting
  - If the previous call was rejected for overlap_with_previous_round or common_prefix_enumeration, the next search call MUST be a full rewrite with a different keyword strategy.
  Negative example (bad, forbidden):
  - "hugo de garis company name UK"
  - "hugo de garis company name Belgium"
  - "hugo de garis company name Germany"
  - "hugo de garis company name France"
  - "hugo de garis company name Italy"
continue_prompt: |
  Below is the summary from the previous attempt:
  {last_summary}
  1. Critical Evaluation:
    The summary provided above is a *suggested* synthesis of past efforts, not an absolute truth. It may contain hallucinations, unverified assumptions, or premature conclusions. You are encouraged to:
    - Identify and ignore any parts of the summary that seem illogical or poorly supported.
    - If the summary's quality is low or its direction feels like a dead-end, you have the full autonomy to completely disregard it and initiate a fresh search strategy.
  2. Expand the search space:
    If the task remains unsolved, it means the current search space is insufficient. Do not get trapped in the "logic loop" of the summary. Use the [Uncertainties, Limitations, Gaps] section as a springboard to:
    - Pivot to entirely different keyword clusters or tool-call strategies.
    - Cross-verify "Facts" that were marked as "unverified" or "partial" in the summary.
    - For each search tool call, use at most 5 high-information-gain queries and avoid near-duplicate wording.
  2.1 Query self-check before every search call (MANDATORY):
    - Overlap check: overlap with last executed queries must be <= 2.
    - Shape check: do not produce queries sharing a long common prefix and only changing tail tokens.
    - Novelty check: each query must introduce at least 2 discriminative tokens not used in the previous round.
    - If any check fails, rewrite all 5 queries before calling search.
  3. Autonomous re-planning:
    The summary provides the *memory*, but you provide the *reasoning*. Based on the existing facts and your own judgment of the current situation, determine your own next steps.
  Now continue your deep search task. You have full permission to be skeptical of the past and bold in your current exploration.
summary_prompt: |
  Summary the trajectory above for the original question you are given: {input}.
  CRITICAL OUTPUT FORMAT REQUIREMENTS (STRICT)
  You MUST follow the exact format below. Do NOT add extra sections, headers, prefaces, or commentary.
  Do NOT use placeholders like “see above”, “as mentioned”, “ibid.”, “refer to earlier”, or “same as before”.
  Do NOT omit any important information that appears in the input. You should follow the output format instruction in the request strictly and wrap the final answer in \\boxed{{}}.

  OUTPUT FORMAT (EXACT)
  You must directly record the actual information content in plain text (not just summaries). Include:
  0) Current Answer
    - Provide the single best, most definite answer identified so far based on conclusive evidence. If no final answer is certain, output the single most plausible best-effort candidate. Do NOT output None/Unknown/N/A. Please wrap the final answer in \\boxed{{}}.
    - ADDITIONALLY, your final answer MUST strictly follow any formatting instructions in the original question — such as alphabetization, sequencing, units, rounding, decimal places, etc.
    - If you are asked for a number, express it numerically (i.e., with digits rather than words), don't use commas, and DO NOT INCLUDE UNITS such as $ or USD or percent signs unless specified otherwise.
    - If you are asked for a string, don't use articles or abbreviations (e.g. for cities), unless specified otherwise. Don't output any final sentence punctuation such as '.', '!', or '?'.
    - If you are asked for a comma-separated list, apply the above rules depending on whether the elements are numbers or strings.
    - If the original question explicitly requires a specific naming form or language (e.g., original name, full English name, Chinese abbreviation), follow that explicit requirement.
    - Do NOT include any punctuation such as '.', '!', or '?' at the end of the answer.
    - Do NOT include any invisible or non-printable characters in the answer output.
  1) Facts & Evidence Collected
    - List every factual item discovered. Attach a source annotation: [Source: <tool/doc> | <URL/id> | Verified: yes/no/partial].
  2) Analysis & Conclusions
    - State all logical conclusions derived, explicitly linking each to the supporting evidence IDs from section (1).
  3) Source Inventory & Verification Status
    - Enumerate all visited sources and evaluate their current verification status.
  4) Uncertainties, Limitations, Gaps
    - List all unknown variables, data ambiguities, and failure modes currently blocking a final decision.

  QUALITY RULES
  - Be exhaustive over the input: no omissions.
  - Keep claims tightly tied to evidence; if you infer, label it “Inference” and explain why.
  - If sources conflict, present both and state which you trust more (and why).
final_summary_prompt: |
  Final consolidation for the original question: {input}.
  CRITICAL OUTPUT FORMAT REQUIREMENTS (STRICT)
  You MUST follow the exact format below.
  Do NOT add extra sections, headers, or prefaces.
  Do NOT output placeholders like “see above”.
  Do NOT output None/Unknown/N/A/empty answer.
  You should follow the output format instruction in the request strictly and wrap the final answer in \\boxed{{}}.
  **ONLY output the final answer without any explanation.**

  OUTPUT FORMAT (EXACT)
  Final Answer (MANDATORY)
    - Provide exactly one concrete answer wrapped in \\boxed{{}}.
    - If evidence is conclusive, output the conclusive answer.
    - If evidence is inconclusive, you MUST output the single most plausible candidate as a Best-Effort Guess (still wrapped in \\boxed{{}}).
    - **ONLY** output the final answer without any explanation
    - The boxed content must be a direct answer string only (no explanation inside the box).
    - ADDITIONALLY, your final answer MUST strictly follow any formatting instructions in the original question — such as alphabetization, sequencing, units, rounding, decimal places, etc.
    - If you are asked for a number, express it numerically (i.e., with digits rather than words), don't use commas, and DO NOT INCLUDE UNITS such as $ or USD or percent signs unless specified otherwise.
    - If you are asked for a string, don't use articles or abbreviations (e.g. for cities), unless specified otherwise. Don't output any final sentence punctuation such as '.', '!', or '?'.
    - If you are asked for a comma-separated list, apply the above rules depending on whether the elements are numbers or strings.
    - If the original question explicitly requires a specific naming form or language (e.g., original name, full English name, Chinese abbreviation), follow that explicit requirement.
    - Do NOT include any punctuation such as '.', '!', or '?' at the end of the answer.
    - Do NOT include any invisible or non-printable characters in the answer output.

  QUALITY RULES
  - Prefer evidence-grounded answers over speculation.
  - If guessing is required, choose from candidates already present in collected evidence whenever possible.
  - Never leave the boxed answer empty.
model:
  model_name: qwen3.5-plus
  temperature: 0.2
  top_p: 0.95
  timeout_s: 120
  extra_body:
    enable_thinking: False
  max_context_length: 122880 # 128K - 8K
  enable_qps_limit: false
  tools:
    - search
    - visit
fallback_model:
  # Used when timeout-triggered fallback is activated.
  model_name: qwen3.5-flash
